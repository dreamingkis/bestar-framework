<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bestar 브랜딩 워크숍</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c1: #1a1a1a; --c2: #03afff; --c3: #68c6ef; --c4: #b8e0f0; --c5: #e0f5fa; --c6: #f5fcfe;
  --border: rgba(3,175,255,0.18); --border2: rgba(3,175,255,0.38);
  --topbar: #3e3a39; --sidebar: #111111;
  --bg: #ffffff; --bg2: #f2f4f6;
  --text: #1a1a1a; --text2: #3d3d3d; --text3: #7a8290;
  --radius: 4px; --radius-lg: 8px;
}
.content-mode {
  --c2: #6B4FA2; --c3: #9B7FD4; --c4: #D0B8EE; --c5: #EDE5FF; --c6: #F8F5FF;
  --border: rgba(107,79,162,0.18); --border2: rgba(107,79,162,0.38);
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

/* ── 진행 바 ── */
.progress-track { height: 3px; background: rgba(255,255,255,0.15); }
.progress-fill { height: 3px; background: var(--c3); transition: width 0.4s ease; width: 0%; }

/* ── 상단 바 ── */
.top-bar { background: var(--topbar); padding: 0 1.5rem; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 12px; }
.top-bar-logo { color: #fff; font-size: 15px; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; white-space: nowrap; }
.top-bar-logo span { color: #68c6ef; }
.top-bar-right { display: flex; align-items: center; gap: 10px; }
.top-bar-right label { color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.top-bar-right input { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.22); border-radius: var(--radius); color: #fff; font-size: 13px; font-family: inherit; padding: 6px 12px; width: 170px; }
.top-bar-right input::placeholder { color: rgba(255,255,255,0.45); }
.top-bar-right input:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.35); }
.top-bar-right input:focus { outline: none; border-color: var(--c3); background: rgba(255,255,255,0.18); }
.top-reset { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); font-size: 11px; padding: 4px 10px; border-radius: var(--radius); cursor: pointer; font-family: inherit; white-space: nowrap; }
.top-reset:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

/* ── 레이아웃 ── */
.layout { display: flex; min-height: calc(100vh - 57px); }

/* ── 사이드바 ── */
.sidebar { width: 220px; background: var(--sidebar); padding: 1.25rem 0; flex-shrink: 0; position: sticky; top: 57px; height: calc(100vh - 57px); overflow-y: auto; }
.sb-section { margin-bottom: 0.5rem; }
.sb-section-hd { display: flex; align-items: center; gap: 8px; padding: 8px 1rem 6px; cursor: pointer; user-select: none; }
.sb-section-dot { width: 8px; height: 8px; border-radius: 50%; background: #03afff; flex-shrink: 0; }
.sb-section-dot.purple { background: #9B7FD4; }
.sb-section-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1.5px; }
.sb-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 0.5rem 1rem 0.75rem; }
.step-item { display: flex; align-items: center; gap: 10px; padding: 8px 1rem; cursor: pointer; transition: all 0.12s; border-left: 3px solid transparent; }
.step-item:hover { background: rgba(255,255,255,0.04); }
.step-item.active { background: rgba(255,255,255,0.06); border-left-color: var(--c2); }
.step-item.done .step-num { background: var(--c2); color: #fff; }
.step-item.active .step-num { background: var(--c2); color: #fff; }
.step-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-name { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.3; }
.step-item.active .step-name { color: #fff; font-weight: 700; }
.step-item.done .step-name { color: rgba(255,255,255,0.65); }

/* ── 모바일 스텝 표시 ── */
.mobile-step { display: none; background: var(--c1); color: #fff; padding: 10px 1rem; font-size: 13px; font-weight: 700; }
.mobile-step-num { color: var(--c3); margin-right: 6px; }

/* ── 메인 ── */
.main { flex: 1; padding: 2rem; max-width: 860px; }

/* ── 카드 ── */
.card { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); border-top: 4px solid var(--c2); padding: 1.75rem; margin-bottom: 1.25rem; }
.card-hd { display: flex; align-items: center; gap: 14px; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
.card-ic { width: 40px; height: 40px; border-radius: var(--radius); background: var(--c2); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.card-ic.b2 { background: var(--c3); }
.card-ttl { font-size: 19px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
.card-sub { font-size: 13px; color: var(--text3); margin-top: 3px; font-weight: 500; }

/* ── 가이드 박스 ── */
.guide { background: var(--c6); border-left: 4px solid var(--c2); padding: 14px 18px; margin-bottom: 1.5rem; font-size: 14px; color: var(--text2); line-height: 1.8; border-radius: 0 var(--radius) var(--radius) 0; }
.guide strong { color: var(--text); }

/* ── 예시 박스 ── */
.ex { background: var(--c5); border: 1.5px solid var(--c4); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 1.5rem; }
.ex-lbl { font-size: 11px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
.ex-txt { font-size: 14px; color: var(--text); line-height: 1.75; }
.ex-copy { cursor: pointer; transition: all 0.12s; }
.ex-copy:hover { border-color: var(--c3); background: var(--c4); }
.ex-copy-hint { font-size: 11px; color: var(--c2); margin-top: 8px; font-weight: 500; }

/* ── 폼 요소 ── */
.fl { margin-bottom: 1.5rem; }
.fl-lbl { font-size: 13px; color: var(--text); margin-bottom: 6px; display: block; font-weight: 700; }
.fl-hint { font-size: 13px; color: var(--text3); margin-bottom: 10px; display: block; line-height: 1.6; }
input[type="text"], textarea {
  width: 100%; padding: 11px 14px; border: 2px solid var(--border2);
  border-radius: var(--radius); background: var(--bg);
  color: var(--text); font-size: 15px; font-family: inherit; transition: border-color 0.15s;
}
input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--c2); box-shadow: 0 0 0 3px rgba(3,175,255,0.08); }
textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

/* ── 키워드 버튼 ── */
.kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 5px; }
.kw { padding: 9px 10px; border-radius: var(--radius); border: 1.5px solid var(--c4); background: var(--bg); color: var(--text2); font-size: 13px; cursor: pointer; text-align: left; transition: all 0.1s; line-height: 1.4; font-family: inherit; }
.kw .kr { display: block; font-size: 13px; font-weight: 700; }
.kw .en { display: block; font-size: 11px; opacity: 0.5; margin-top: 1px; }
.kw:hover { border-color: var(--c2); background: var(--c6); }
.kw[data-sel="1"] { color: #fff !important; border-color: transparent !important; background: var(--c2) !important; }
.kw[data-sel="1"] .en { opacity: 0.75 !important; }

/* ── 아코디언 ── */
.acc { border: 1.5px solid var(--border2); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
.acc-hd { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: var(--c6); cursor: pointer; user-select: none; transition: background 0.12s; }
.acc-hd:hover { background: var(--c5); }
.acc-title { font-size: 13px; font-weight: 700; color: var(--text); }
.acc-meta { display: flex; align-items: center; gap: 8px; }
.acc-count { font-size: 11px; color: var(--c2); background: var(--bg); border: 1.5px solid var(--c4); border-radius: 2px; padding: 1px 8px; font-weight: 700; }
.acc-arrow { font-size: 10px; color: var(--c2); transition: transform 0.2s; display: inline-block; }
.acc-arrow.open { transform: rotate(180deg); }
.acc-body { padding: 10px; display: none; background: var(--bg); }
.acc-body.open { display: block; }

/* ── 배지 / 태그 ── */
.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 2px; background: var(--c2); color: #fff; font-size: 11px; margin-left: 6px; vertical-align: middle; font-weight: 700; }
.divider { height: 2px; background: var(--bg2); margin: 1.75rem 0; }
.tag-b { display: inline-block; padding: 3px 10px; border-radius: 2px; font-size: 12px; margin: 2px; background: var(--c5); color: var(--text); border: 1.5px solid var(--c4); font-weight: 700; }

/* ── 내비게이션 ── */
.nav { display: flex; gap: 8px; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
.btn-p { padding: 11px 20px; border-radius: var(--radius); border: 2px solid var(--border2); background: var(--bg); color: var(--text2); font-size: 14px; cursor: pointer; font-family: inherit; transition: all 0.12s; font-weight: 700; }
.btn-p:hover { border-color: var(--c2); color: var(--c2); }
.btn-n { flex: 1; padding: 13px; border-radius: var(--radius); border: none; background: var(--c2); color: #fff; font-size: 15px; cursor: pointer; font-weight: 900; font-family: inherit; transition: all 0.12s; letter-spacing: -0.3px; }
.btn-n:hover { background: var(--c1); }
.btn-n.b2 { background: var(--c3); }
.btn-n.b2:hover { background: var(--c2); }

/* ── 대화형 가이드 ── */
.dialog-guide { border: 2px solid var(--border2); border-radius: var(--radius-lg); margin-bottom: 1.5rem; overflow: hidden; }
.dialog-guide-hd { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; background: var(--c1); cursor: pointer; user-select: none; }
.dialog-guide-ttl { font-size: 13px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
.dialog-guide-ttl span { font-size: 15px; }
.dialog-guide-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 1px; }
.dialog-guide-arrow { font-size: 10px; color: rgba(255,255,255,0.5); transition: transform 0.2s; display: inline-block; }
.dialog-guide-arrow.open { transform: rotate(180deg); }
.dialog-guide-body { background: var(--bg); display: none; }
.dialog-guide-body.open { display: block; }
.dq-item { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.dq-item:last-child { border-bottom: none; }
.dq-label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.dq-num { width: 22px; height: 22px; border-radius: 50%; background: var(--c2); color: #fff; font-size: 11px; font-weight: 900; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dq-hint { font-size: 13px; color: var(--text3); margin-bottom: 8px; line-height: 1.6; }
.dq-input { width: 100%; padding: 10px 14px; border: 2px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.15s; resize: vertical; min-height: 50px; line-height: 1.65; }
.dq-input:focus { outline: none; border-color: var(--c2); background: var(--bg); box-shadow: 0 0 0 3px rgba(3,175,255,0.08); }
.dialog-guide-footer { padding: 14px 20px; background: var(--c6); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.dialog-guide-footer-txt { font-size: 13px; color: var(--text3); line-height: 1.5; }
.assemble-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: none; border-radius: var(--radius); background: var(--c2); color: #fff; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 900; transition: all 0.12s; white-space: nowrap; }
.assemble-btn:hover { background: var(--c1); }

/* ── Brand Statement 템플릿 ── */
.fill-wrap { background: var(--bg); border: 2px solid var(--c4); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 1rem; }
.fill-lbl { font-size: 11px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; display: block; }
.fill-row { font-size: 14px; color: var(--text2); line-height: 3.2; }
.fill-row .fi { display: inline-block; border: none; border-bottom: 2.5px solid var(--c2); background: var(--c5); color: var(--text); font-size: 13px; font-family: inherit; font-weight: 700; padding: 1px 8px; min-width: 70px; max-width: 190px; outline: none; border-radius: var(--radius) var(--radius) 0 0; transition: background 0.12s; }
.fill-row .fi:focus { background: var(--c4); }
.gen-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: none; border-radius: var(--radius); background: var(--c2); color: #fff; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 900; transition: all 0.12s; margin-top: 12px; }
.gen-btn:hover { background: var(--c1); }

/* ── Brand Concept ── */
.concept-box { background: var(--c1); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 1rem; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 16px; font-weight: 900; color: #fff; line-height: 2.6; letter-spacing: -0.3px; }
.concept-box .ci { display: inline-block; border: none; border-bottom: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 15px; font-family: inherit; font-weight: 700; padding: 2px 8px; min-width: 80px; max-width: 170px; outline: none; border-radius: var(--radius) var(--radius) 0 0; }
.concept-box .ci::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; font-size: 13px; }
.concept-box .ci:focus { border-bottom-color: var(--c3); background: rgba(255,255,255,0.12); }

/* ── Brand Message ── */
.msg-box { background: var(--c5); border: 2px solid var(--c4); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.msg-quote { font-size: 26px; color: var(--c2); font-weight: 900; line-height: 1; flex-shrink: 0; }
.msg-box .mi { flex: 1; border: none; border-bottom: 2px solid var(--c4); background: transparent; color: var(--text); font-size: 15px; font-family: inherit; font-style: italic; padding: 2px 4px; outline: none; }
.msg-box .mi:focus { border-bottom-color: var(--c2); }

/* ── 비율 가이드 ── */
.ratio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
.ratio-card { border: 1.5px solid var(--border2); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: all 0.12s; }
.ratio-card:hover { border-color: var(--c2); background: var(--c6); }
.ratio-card.selected { border-color: var(--c2); background: var(--c5); }
.ratio-type { font-size: 12px; font-weight: 700; color: var(--c2); margin-bottom: 4px; }
.ratio-bar { height: 8px; border-radius: 4px; display: flex; overflow: hidden; margin-bottom: 6px; }
.ratio-bar-exp { background: var(--c2); }
.ratio-bar-hum { background: var(--c4); }
.ratio-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }

/* ── 내보내기 ── */
.export-bar { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
.export-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border: 2px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 700; transition: all 0.12s; }
.export-btn:hover { border-color: var(--c2); color: var(--c2); }
.export-btn.primary { border: none; background: var(--c2); color: #fff; }
.export-btn.primary:hover { background: var(--c1); }

/* ── Brand House 시각화 ── */
.bh-wrap { margin-top: 1.25rem; }
.bh-roof { position: relative; height: 90px; margin-bottom: -2px; }
.bh-roof svg { width: 100%; height: 100%; }
.bh-body { border: 2px solid var(--c3); border-radius: 0 0 8px 8px; overflow: hidden; }
.bh-concept { padding: 12px 18px; background: var(--c1); color: #fff; font-size: 15px; font-weight: 900; text-align: center; border-bottom: 1.5px solid rgba(255,255,255,0.1); letter-spacing: -0.3px; }
.bh-concept em { font-style: normal; color: var(--c3); }
.bh-message { padding: 10px 18px; background: var(--c5); text-align: center; font-size: 14px; font-style: italic; color: var(--text); border-bottom: 1.5px solid var(--c4); }
.bh-promise { padding: 14px 18px; background: var(--c2); border-bottom: 1.5px solid var(--c3); }
.bh-promise-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
.bh-promise-val { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.6; }
.bh-tr { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1.5px solid var(--c4); }
.bh-tr-cell { padding: 12px 14px; background: var(--c5); display: flex; flex-direction: column; justify-content: center; }
.bh-tr-cell:first-child { border-right: 1.5px solid var(--c4); }
.bh-vals { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1.5px solid var(--c4); }
.bh-val { background: var(--bg); border-right: 1px solid var(--c4); overflow: hidden; }
.bh-val:last-child { border-right: none; }
.bh-val-hdr { font-size: 9px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 1px; text-align: center; background: var(--c5); padding: 6px 4px; border-bottom: 1px solid var(--c4); }
.bh-val-bd { padding: 10px; }
.bh-kb-hdr { background: var(--c2); padding: 8px 14px; text-align: center; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
.bh-kb-bd { background: var(--bg); padding: 12px 14px; min-height: 48px; }
.cell-hdr { font-size: 10px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.cv { font-size: 13px; color: var(--text); line-height: 1.6; }
.cv-m { font-size: 12px; color: var(--text3); font-style: italic; }

/* ── Content House 시각화 ── */
.ch-auth { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1.5px solid var(--c3); }
.ch-ac { padding: 12px; text-align: center; background: var(--c1); color: #fff; border-right: 1.5px solid rgba(255,255,255,0.12); }
.ch-ac:last-child { border-right: none; }
.ch-al { font-size: 10px; color: var(--c4); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.ch-av { font-size: 13px; font-weight: 700; }
.ch-pp { display: grid; grid-template-columns: 1fr 2fr 1fr; border-bottom: 1.5px solid var(--c3); }
.ch-pl { padding: 12px; background: var(--c2); color: #fff; }
.ch-pl:first-child { border-right: 1.5px solid rgba(255,255,255,0.2); }
.ch-pl:last-child { border-left: 1.5px solid rgba(255,255,255,0.2); }
.ch-ct { display: grid; grid-template-rows: 1fr 1fr; }
.ch-cc { padding: 12px; background: var(--c6); border-bottom: 1px solid var(--c4); }
.ch-cc:last-child { border-bottom: none; }
.ch-fn { display: grid; grid-template-columns: 1fr 1fr; }
.ch-fc { padding: 12px; background: var(--c1); color: #fff; }
.ch-fc:first-child { border-right: 1.5px solid rgba(255,255,255,0.12); }
.ch-fn-arrow { text-align: center; padding: 6px; background: var(--c1); color: var(--c3); font-size: 13px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.08); }
.ctitle { font-size: 10px; font-weight: 700; color: var(--c3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
.ctitle.lt { color: var(--c4); }

/* ── 모바일 반응형 ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-step { display: flex; align-items: center; justify-content: space-between; }
  .main { padding: 1rem; }
  .top-bar { padding: 0 1rem; }
  .top-bar-right label { display: none; }
  .top-bar-right input { width: 130px; }
  .top-reset { padding: 4px 6px; font-size: 10px; }
  .card { padding: 1.25rem; }
  .kw-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .bh-tr { grid-template-columns: 1fr; }
  .bh-tr-cell:first-child { border-right: none; border-bottom: 1.5px solid var(--c4); }

<body>

<div class="top-bar">
  <div class="top-bar-logo">be<span>star</span> branding workshop</div>
  <div class="top-bar-right">
    <label>Brand</label>
    <input type="text" id="cn" placeholder="브랜드명..." oninput="cN=this.value;saveData()" />
    <button class="top-reset" onclick="resetAll()">초기화</button>
  </div>
</div>
<div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div>
    <div class="mobile-step" id="mobile-step"></div>
    <div class="main" id="sc"></div>
  </div>
</div>

<script>
let step=0, cN='';
let d={
  target:[], targetCustom:'', role:[], roleCustom:'', product:'', benefit:'',
  fv:[], ev:[], pv:[], promise:'', slogan:'',
  identity:'', scale:'', time:'', perf:'', method:'', attitude:'',
  expertise:'', humanity:'', dream:'', value:'',
  brandMsg:'', bsConcept1:'', bsConcept2:'',
  dq:{}
};

/* ── localStorage ── */
function saveData(){
  try{ localStorage.setItem('bestar-ws',JSON.stringify({d,cN,step})); }catch(e){}
}
function loadData(){
  try{
    const s=localStorage.getItem('bestar-ws');
    if(s){ const p=JSON.parse(s); if(p.d){Object.assign(d,p.d);if(!d.dq)d.dq={};} if(p.cN){cN=p.cN;document.getElementById('cn').value=cN;} if(typeof p.step==='number')step=p.step; }
  }catch(e){}
}
function resetAll(){
  if(!confirm('모든 입력 내용을 삭제하고 처음부터 시작할까요?')) return;
  localStorage.removeItem('bestar-ws');
  location.reload();
}

/* ── Steps ── */
const bSteps=[
  {id:'target',label:'타겟 페르소나',icon:'🎯'},{id:'role',label:'브랜드 역할',icon:'◎'},
  {id:'benefit',label:'핵심 혜택',icon:'✦'},{id:'values',label:'핵심 가치',icon:'◆'},
  {id:'promise',label:'브랜드 약속',icon:'◈'},{id:'slogan',label:'슬로건',icon:'★'},
  {id:'brand_result',label:'Brand House',icon:'▣'}
];
const cSteps=[
  {id:'foundation',label:'토대',icon:'▬'},{id:'identity',label:'정체성',icon:'▲'},
  {id:'authority',label:'권위의 증거',icon:'▪'},{id:'pillars',label:'기둥',icon:'▐'},
  {id:'core',label:'콘텐츠 영역',icon:'◈'},{id:'content_result',label:'Content House',icon:'▣'}
];
const allSteps=[...bSteps,...cSteps];
const brandIds=new Set(bSteps.map(s=>s.id));

function updateTheme(){
  const cur=allSteps[step];
  if(cur&&!brandIds.has(cur.id)) document.body.classList.add('content-mode');
  else document.body.classList.remove('content-mode');
}

function renderSidebar(){
  let html=`<div class="sb-section"><div class="sb-section-hd" onclick="goStep(0)"><div class="sb-section-dot"></div><span class="sb-section-label">Brand House</span></div>`;
  bSteps.forEach((s,i)=>{
    const cls=i<step?'done':i===step?'active':'';
    html+=`<div class="step-item ${cls}" onclick="goStep(${i})"><div class="step-num">${i<step?'✓':i+1}</div><span class="step-name">${s.label}</span></div>`;
  });
  html+=`</div><div class="sb-divider"></div><div class="sb-section"><div class="sb-section-hd" onclick="goStep(${bSteps.length})"><div class="sb-section-dot purple"></div><span class="sb-section-label">Content House</span></div>`;
  cSteps.forEach((s,i)=>{
    const gi=bSteps.length+i;
    const cls=gi<step?'done':gi===step?'active':'';
    html+=`<div class="step-item ${cls}" onclick="goStep(${gi})"><div class="step-num">${gi<step?'✓':i+1}</div><span class="step-name">${s.label}</span></div>`;
  });
  html+=`</div>`;
  document.getElementById('sidebar').innerHTML=html;
  // mobile
  const cur=allSteps[step];
  document.getElementById('mobile-step').innerHTML=`<span><span class="mobile-step-num">Step ${step+1}/${allSteps.length}</span>${cur?cur.label:''}</span><span style="font-size:11px;color:var(--c3)">${step<bSteps.length?'Brand House':'Content House'}</span>`;
}

function render(){
  updateTheme();
  document.getElementById('progress-fill').style.width=(step/(allSteps.length-1)*100)+'%';
  renderSidebar();
  renderStep();
  saveData();
}

function goStep(i){ step=i; render(); window.scrollTo(0,0); }
function next(){ if(step<allSteps.length-1){ step++; render(); window.scrollTo(0,0); } }
function prev(){ if(step>0){ step--; render(); window.scrollTo(0,0); } }

/* ── 대화형 가이드 ── */
const dialogGuides={
  target:{
    questions:[
      {label:'지금 주로 어떤 사람들이 고객인가요?',hint:'직업, 나이대, 상황. 예) 30대 후반, 퇴사를 앞둔 직장인'},
      {label:'그 사람들이 가장 원하는 것은?',hint:'해결하고 싶은 고민이나 이루고 싶은 것'},
      {label:'그들을 한 문장으로 설명한다면?',hint:'위 답변을 합쳐 한 줄로 표현'}
    ],
    mode:'assemble', targetField:'target-custom', dataKey:'targetCustom',
    assemble:ans=>ans.filter(Boolean).join(', ')
  },
  benefit:{
    questions:[
      {label:'상품/서비스는 구체적으로 무엇을 제공하나요?',hint:'횟수, 방식, 포함 내용'},
      {label:'그것이 왜 좋은가요? (기능적 장점)',hint:'예) 체계적인 과정으로 방향이 흔들리지 않음'},
      {label:'고객의 삶에서 실제로 어떤 변화가?',hint:'수치나 구체적 변화로 표현하면 강력'}
    ],
    mode:'assemble', targetField:'benefit-ta', dataKey:'benefit',
    assemble:ans=>ans[2]||ans.filter(Boolean).join(' → ')
  },
  promise:{
    questions:[
      {label:'고객이 현재 겪는 가장 큰 어려움은?',hint:'막연함, 방향 없음, 시간 낭비 등'},
      {label:'우리와 함께하면 어떻게 달라지나요?',hint:'Before → After 로 생각해보세요'},
      {label:'우리 브랜드만이 줄 수 있는 특별한 것?',hint:'경쟁자와 다른 점 한 가지'}
    ],
    mode:'assemble', targetField:'promise-ta', dataKey:'promise',
    assemble:ans=>{const p=ans.filter(Boolean);return p.length<2?p[0]||'':`${p[0]}을 겪는 분들이 ${p[1]}. ${p[2]?p[2]+'.':''}`;}
  },
  identity:{
    questions:[
      {label:'내가 가진 가장 독특한 강점은?',hint:'다른 사람들이 자주 칭찬하는 것'},
      {label:'내 일이 만드는 사회적 가치는?',hint:'고객이나 세상에 어떤 변화를'},
      {label:'위 두 가지를 합쳐 타이틀로 표현하면?',hint:'"강사" → "학습경험 설계자"처럼'}
    ],
    mode:'assemble', targetField:'identity-input', dataKey:'identity',
    assemble:ans=>ans[2]||ans.filter(Boolean).join(' + ')
  },
  authority:{
    questions:[
      {label:'당신의 이력 중 숫자로 가장 놀라운 것은?',hint:'매출, 수강생 수, 자산 규모 등',dataKey:'scale',inputId:'scale-input'},
      {label:'이 일을 지속해온 가장 긴 시간의 기록은?',hint:'연차, 프로젝트 수 등',dataKey:'time',inputId:'time-input'},
      {label:'고객의 삶에서 가장 크게 바뀐 수치는?',hint:'성장률, 비포&애프터 등',dataKey:'perf',inputId:'perf-input'}
    ],
    mode:'direct'
  },
  pillars:{
    questions:[
      {label:'문제를 해결하는 나만의 독특한 공식은?',hint:'방식/시선. 예) 강점 기반으로 정체성을 먼저 잡는다',dataKey:'method',inputId:'method-ta'},
      {label:'메시지를 전달하는 나의 목소리의 결은?',hint:'태도/소통. 예) 단호한 확신과 팩폭',dataKey:'attitude',inputId:'attitude-ta'}
    ],
    mode:'direct'
  },
  core:{
    questions:[
      {label:'전문성으로 증명하는 콘텐츠는? (실력)',hint:'케이스 스터디, 노하우, 방법론 등',dataKey:'expertise',inputId:'expertise-ta'},
      {label:'인간적으로 연결되는 콘텐츠는? (매력)',hint:'가치관, 일상, 실패 경험, 성장 스토리',dataKey:'humanity',inputId:'humanity-ta'}
    ],
    mode:'direct'
  },
  foundation:{
    questions:[
      {label:'이상적인 고객은 어떤 사람인가요?',hint:'직업, 상황, 고민을 구체적으로',dataKey:'dream',inputId:'dream-ta'},
      {label:'그 고객이 얻게 될 변화와 약속은?',hint:'삶이 어떻게 달라지는지 구체적으로',dataKey:'value',inputId:'value-ta'}

    mode:'direct'
  }
};

function dialogBox(stepId,open){
  const g=dialogGuides[stepId]; if(!g) return '';
  const isDirect=g.mode==='direct';
  const qHtml=g.questions.map((q,i)=>{
    const saved=d.dq[stepId+'_'+i]||'';
    return `<div class="dq-item">
      <div class="dq-label"><span class="dq-num">${i+1}</span>${q.label}</div>
      <div class="dq-hint">${q.hint}</div>
      <textarea class="dq-input" id="dq-${stepId}-${i}" rows="2" placeholder="여기에 답변을 적어보세요..." oninput="d.dq['${stepId}_${i}']=this.value;saveData()">${saved}</textarea>
    </div>`;
  }).join('');
  const footerTxt=isDirect?'각 답변이 해당 입력 필드에 바로 적용됩니다.':'답변을 바탕으로 자동 완성합니다. 완성 후 직접 수정 가능.';
  const btnTxt=isDirect?'↓ 각 필드에 적용':'↓ 자동 완성하기';
  return `<div class="dialog-guide">
    <div class="dialog-guide-hd" onclick="toggleDialog(this)">
      <div><div class="dialog-guide-ttl"><span>💬</span>먼저 이 질문들에 답해보세요</div>
      <div class="dialog-guide-sub">${isDirect?'답변이 아래 각 입력 필드에 적용됩니다':'답변을 입력하면 아래 내용을 자동으로 완성해드려요'}</div></div>
      <span class="dialog-guide-arrow ${open?'open':''}">▼</span>
    </div>
    <div class="dialog-guide-body ${open?'open':''}">
      ${qHtml}
      <div class="dialog-guide-footer">
        <span class="dialog-guide-footer-txt">${footerTxt}</span>
        <button class="assemble-btn" onclick="applyDialog('${stepId}')">${btnTxt}</button>
      </div>
    </div>
  </div>`;
}

function toggleDialog(hd){
  const body=hd.nextElementSibling,arrow=hd.querySelector('.dialog-guide-arrow');
  body.classList.toggle('open'); arrow.classList.toggle('open');
}

function applyDialog(stepId){
  const g=dialogGuides[stepId]; if(!g) return;
  const answers=g.questions.map((_,i)=>{const el=document.getElementById(`dq-${stepId}-${i}`);return el?el.value.trim():'';});
  if(answers.every(a=>!a)){alert('먼저 위의 질문에 답변을 입력해주세요.');return;}

  if(g.mode==='direct'){
    g.questions.forEach((q,i)=>{
      if(q.dataKey&&q.inputId&&answers[i]){
        d[q.dataKey]=answers[i];
        const el=document.getElementById(q.inputId);
        if(el){el.value=answers[i];el.style.borderColor='var(--c2)';setTimeout(()=>{el.style.borderColor='';},1500);}
      }
    });
    const firstTarget=g.questions.find(q=>q.inputId);
    if(firstTarget){const el=document.getElementById(firstTarget.inputId);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
  } else {
    const result=g.assemble(answers);
    if(!result){alert('먼저 위의 질문에 답변을 입력해주세요.');return;}
    d[g.dataKey]=result;
    const el=document.getElementById(g.targetField);
    if(el){el.value=result;el.focus();el.style.borderColor='var(--c2)';setTimeout(()=>{el.style.borderColor='';},1500);el.scrollIntoView({behavior:'smooth',block:'center'});}
  }
  saveData();
}

function copyEx(text,targetId){
  const el=document.getElementById(targetId);if(!el)return;
  el.value=text;el.focus();el.style.borderColor='var(--c2)';
  setTimeout(()=>{el.style.borderColor='';},1200);
}

function genPromise(){
  const t=document.getElementById('bs-t').value||(d.target[0]||d.targetCustom||'타겟 고객');
  const f=document.getElementById('bs-f').value||(d.fv[0]||'기능적 혜택');
  const e=document.getElementById('bs-e').value||(d.ev[0]||'감성적 혜택');
  const b=document.getElementById('bs-b').value||(cN||'브랜드명');
  const r=document.getElementById('bs-r').value||(d.role[0]||d.roleCustom||'역할');
  const p=document.getElementById('bs-p').value||(d.benefit||'핵심 약속');
  const stmt=`우리 브랜드는 ${t}에게 ${f}와 ${e}를 제공하기 위해 ${b}로서 ${r} 역할을 수행하며 ${p}을 약속합니다`;
  d.promise=stmt;
  const ta=document.getElementById('promise-ta');if(ta)ta.value=stmt;
  saveData();
}

function kGrid(list,field,max){
  return `<div class="kw-grid">${list.map(k=>{
    const sel=d[field].includes(k.kr)?'1':'0';
    const safe=k.kr.replace(/'/g,"\\'");
    return `<button class="kw" data-type="${field}" data-val="${k.kr}" data-sel="${sel}" onclick="toggleK('${field}','${safe}',${max},this)"><span class="kr">${k.kr}</span><span class="en">${k.en}</span></button>`;
  }).join('')}</div>`;
}
function roleAcc(){
  return roleCategories.map((cat,ci)=>{
    const selInCat=cat.items.filter(k=>d.role.includes(k.kr));
    const isOpen=selInCat.length>0||ci===0;
    return `<div class="acc"><div class="acc-hd" onclick="toggleAcc(this)"><span class="acc-title">${cat.icon} ${cat.cat}</span><div class="acc-meta">${selInCat.length>0?`<span class="acc-count">${selInCat.length}개 선택</span>`:''}<span class="acc-arrow ${isOpen?'open':''}">▼</span></div></div><div class="acc-body ${isOpen?'open':''}"><div class="kw-grid">${cat.items.map(k=>{
      const sel=d.role.includes(k.kr)?'1':'0';const safe=k.kr.replace(/'/g,"\\'");
      return `<button class="kw" data-type="role" data-val="${k.kr}" data-sel="${sel}" onclick="toggleK('role','${safe}',1,this)"><span class="kr">${k.kr}</span><span class="en">${k.en}</span></button>`;
    }).join('')}</div></div></div>`;
  }).join('');
}
function toggleAcc(hd){const body=hd.nextElementSibling,arrow=hd.querySelector('.acc-arrow'),o=body.classList.contains('open');body.classList.toggle('open',!o);arrow.classList.toggle('open',!o);}
function toggleK(field,val,max,btn){
  if(d[field].includes(val)){d[field]=d[field].filter(x=>x!==val);btn.dataset.sel='0';}
  else if(d[field].length<max){
    if(max===1&&d[field].length>=1){const old=document.querySelector(`.kw[data-type="${field}"][data-val="${d[field][0]}"]`);if(old)old.dataset.sel='0';d[field]=[];}
    d[field].push(val);btn.dataset.sel='1';
  }
  const badge=document.getElementById('badge-'+field);if(badge)badge.textContent=d[field].length;
  if(field==='role')updateAccCounts();
  saveData();
}
function updateAccCounts(){
  roleCategories.forEach((cat,ci)=>{const acc=document.querySelectorAll('.acc')[ci];if(!acc)return;const sel=cat.items.filter(k=>d.role.includes(k.kr));const meta=acc.querySelector('.acc-meta'),arrow=acc.querySelector('.acc-arrow'),ex=meta.querySelector('.acc-count');if(sel.length>0){if(ex)ex.textContent=`${sel.length}개 선택`;else{const s=document.createElement('span');s.className='acc-count';s.textContent=`${sel.length}개 선택`;meta.insertBefore(s,arrow);}}else if(ex)ex.remove();});
}

      ${dialogBox('identity',true)}
      <div class="guide">단순한 직업명이 아닙니다. <strong>사회적 쓸모와 강점이 결합된 유일무이한 타이틀</strong>이어야 합니다.</div>
      <div class="ex ex-copy" onclick="copyEx('1인기업 브랜드 언어 설계자','identity-input')"><div class="ex-lbl">bestar 예시 — 클릭하면 복사</div><div class="ex-txt">1인기업 브랜드 언어 설계자</div><div class="ex-copy-hint">▲ 클릭하면 복사</div></div>
      <div class="fl"><label class="fl-lbl">나만의 타이틀</label><span class="fl-hint">"설계자", "안내자", "큐레이터"처럼 역할이 담긴 동사적 명사로 표현</span><input type="text" id="identity-input" value="${d.identity}" oninput="d.identity=this.value;saveData()" placeholder="예) 1인기업 브랜드 언어 설계자" /></div>
    </div>${nav()}`;

  } else if(s.id==='authority'){
    el.innerHTML=`<div class="card">
      <div class="card-hd"><div class="card-ic">▪</div><div><div class="card-ttl">권위의 증거 Authority</div><div class="card-sub">증거 띠 — 3초 만에 신뢰를 만드는 숫자</div></div></div>
      ${dialogBox('authority',true)}
      <div class="fl"><label class="fl-lbl">규모 Scale</label><input type="text" id="scale-input" value="${d.scale}" oninput="d.scale=this.value;saveData()" placeholder="예) 컨설팅 100명+" /></div>
      <div class="fl"><label class="fl-lbl">경력 Time</label><input type="text" id="time-input" value="${d.time}" oninput="d.time=this.value;saveData()" placeholder="예) 브랜딩 컨설팅 7년" /></div>
      <div class="fl"><label class="fl-lbl">성과 Performance</label><input type="text" id="perf-input" value="${d.perf}" oninput="d.perf=this.value;saveData()" placeholder="예) 수강생 브랜드 전환율 3배" /></div>
    </div>${nav()}`;

  } else if(s.id==='pillars'){
    el.innerHTML=`<div class="card">
      <div class="card-hd"><div class="card-ic">▐</div><div><div class="card-ttl">기둥 Pillars</div><div class="card-sub">콘텐츠를 관통하는 나만의 필터</div></div></div>
      ${dialogBox('pillars',true)}
      <div class="fl"><label class="fl-lbl">방식/시선 Method</label><span class="fl-hint">문제를 해결하는 나만의 독특한 공식</span><textarea id="method-ta" oninput="d.method=this.value;saveData()" placeholder="예) 강점 기반으로 정체성을 먼저 잡고, 콘텐츠 구조를 뒤에 얹는 방식">${d.method}</textarea></div>
      <div class="fl"><label class="fl-lbl">태도/소통 Attitude</label><span class="fl-hint">메시지를 전달하는 목소리의 결</span><textarea id="attitude-ta" oninput="d.attitude=this.value;saveData()" placeholder="예) 돌려 말하지 않고 핵심을 짚어주되, 상대방 언어를 먼저 듣는 태도">${d.attitude}</textarea></div>
    </div>${nav()}`;

  } else if(s.id==='core'){
    el.innerHTML=`<div class="card">
      <div class="card-hd"><div class="card-ic b2">◈</div><div><div class="card-ttl">콘텐츠 영역 Core</div><div class="card-sub">피드에 올라갈 두 개의 핵심 축</div></div></div>
      ${dialogBox('core',true)}
      <div class="guide"><strong>실력</strong>은 "뭘 아는지", <strong>매력</strong>은 "어떤 사람인지". 둘의 균형이 팔로워를 팬으로 만듭니다.</div>
      <div style="margin-bottom:1.5rem">
        <label class="fl-lbl" style="margin-bottom:10px">실력:매력 비율 가이드</label>
        <div class="ratio-grid">
          <div class="ratio-card"><div class="ratio-type">영향력 중심</div><div class="ratio-bar"><div class="ratio-bar-exp" style="width:80%"></div><div class="ratio-bar-hum" style="width:20%"></div></div><div class="ratio-desc">실력 80 : 매력 20<br>전문성 자체가 매력. 전면 배치.</div></div>
          <div class="ratio-card"><div class="ratio-type">관계/소통 중심</div><div class="ratio-bar"><div class="ratio-bar-exp" style="width:40%"></div><div class="ratio-bar-hum" style="width:60%"></div></div><div class="ratio-desc">실력 40 : 매력 60<br>호감으로 신뢰 구축 후 전문성.</div></div>
          <div class="ratio-card"><div class="ratio-type">전략/사고 중심</div><div class="ratio-bar"><div class="ratio-bar-exp" style="width:70%"></div><div class="ratio-bar-hum" style="width:30%"></div></div><div class="ratio-desc">실력 70 : 매력 30<br>분석력과 인사이트 중심.</div></div>
          <div class="ratio-card"><div class="ratio-type">실행 중심</div><div class="ratio-bar"><div class="ratio-bar-exp" style="width:60%"></div><div class="ratio-bar-hum" style="width:40%"></div></div><div class="ratio-desc">실력 60 : 매력 40<br>과정과 결과 + 스토리텔링.</div></div>
        </div>
      </div>
      <div class="fl"><label class="fl-lbl">실력 Expertise</label><span class="fl-hint">전문 지식, 케이스 스터디, 노하우 등</span><textarea id="expertise-ta" oninput="d.expertise=this.value;saveData()" placeholder="예) 브랜딩 케이스 스터디, 비포&애프터">${d.expertise}</textarea></div>
      <div class="fl"><label class="fl-lbl">매력 Humanity</label><span class="fl-hint">일상, 가치관, 실패 경험, 성장 스토리 등</span><textarea id="humanity-ta" oninput="d.humanity=this.value;saveData()" placeholder="예) 1인기업 운영 이야기, 브랜딩 철학">${d.humanity}</textarea></div>
    </div>${nav('Content House 완성 →')}`;

  } else if(s.id==='content_result'){
    el.innerHTML=`<div class="card"><div class="card-hd"><div class="card-ic b2">▣</div><div><div class="card-ttl">Content House 완성</div><div class="card-sub">${cN||'Brand'}</div></div></div>${renderCH()}<div class="export-bar"><button class="export-btn primary" onclick="exportCH()">📋 텍스트 복사</button><button class="export-btn" onclick="window.print()">🖨 인쇄 / PDF</button></div></div>${nav(null,true)}`;
  }
}

function cv(v,ph,light){return v?`<span style="font-size:13px;color:${light?'#fff':'var(--text)'};line-height:1.6">${v}</span>`:`<span class="cv-m">${ph}</span>`;}
function tags(arr){return arr.length?arr.map(a=>`<span class="tag-b">${a}</span>`).join(''):'<span class="cv-m">미선택</span>';}

function renderBH(){
  const role=d.role[0]||d.roleCustom||'—';
  const targetStr=[...d.target.slice(0,3),(d.targetCustom||'')].filter(Boolean).join(' · ')||'—';
  const hasConcept=d.bsConcept1||d.bsConcept2;
  return `<div class="bh-wrap">
    <div class="bh-roof"><svg viewBox="0 0 800 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,90 400,0 800,90" fill="#03afff"/>
      <text x="400" y="38" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)" font-family="sans-serif" letter-spacing="3" font-weight="700">SLOGAN</text>
      <text x="400" y="66" text-anchor="middle" font-size="15" font-weight="900" fill="white" font-family="sans-serif">${d.slogan||'슬로건을 입력하면 여기에 표시됩니다'}</text>
    </svg></div>
    <div class="bh-body">
      ${hasConcept?`<div class="bh-concept">나는 <em>${d.bsConcept1||'___'}</em>가 아니라 <em>${d.bsConcept2||'___'}</em>를 판다</div>`:''}
      ${d.brandMsg?`<div class="bh-message">"${d.brandMsg}"</div>`:''}
      <div class="bh-promise"><div class="bh-promise-lbl">Brand Promise</div><div class="bh-promise-val">${d.promise||'<span style="opacity:.5;font-weight:400;font-size:13px">미입력</span>'}</div></div>
      <div class="bh-tr"><div class="bh-tr-cell"><div class="cell-hdr">타겟 페르소나</div>${cv(targetStr,'미입력',false)}</div><div class="bh-tr-cell"><div class="cell-hdr">브랜드 역할</div>${cv(role,'미입력',false)}</div></div>
      <div class="bh-vals">
        <div class="bh-val"><div class="bh-val-hdr">Functional Value</div><div class="bh-val-bd">${tags(d.fv)}</div></div>
        <div class="bh-val"><div class="bh-val-hdr">Emotional Value</div><div class="bh-val-bd">${tags(d.ev)}</div></div>
        <div class="bh-val"><div class="bh-val-hdr">Personality</div><div class="bh-val-bd">${tags(d.pv)}</div></div>
      </div>
      ${d.product?`<div style="padding:8px 14px;background:var(--c6);border-bottom:1.5px solid var(--c4);font-size:12px;color:var(--text3)"><strong style="color:var(--text2)">상품/서비스:</strong> ${d.product}</div>`:''}
      <div class="bh-kb-hdr">Key Benefit</div>
      <div class="bh-kb-bd">${cv(d.benefit,'핵심 혜택을 입력하면 여기에 표시됩니다',false)}</div>
    </div>
  </div>`;
}

function renderCH(){
  return `<div class="bh-wrap">
    <div class="bh-roof"><svg viewBox="0 0 800 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,90 400,0 800,90" fill="#6B4FA2"/>
      <text x="400" y="38" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)" font-family="sans-serif" letter-spacing="3" font-weight="700">IDENTITY</text>
      <text x="400" y="66" text-anchor="middle" font-size="15" font-weight="900" fill="white" font-family="sans-serif">${d.identity||'정체성을 입력하세요'}</text>
    </svg></div>
    <div class="bh-body">
      <div class="ch-auth">
        <div class="ch-ac"><div class="ch-al">Scale 규모</div><div class="ch-av">${d.scale||'—'}</div></div>
        <div class="ch-ac"><div class="ch-al">Time 경력</div><div class="ch-av">${d.time||'—'}</div></div>
        <div class="ch-ac"><div class="ch-al">Performance 성과</div><div class="ch-av">${d.perf||'—'}</div></div>
      </div>
      <div class="ch-pp">
        <div class="ch-pl"><div class="ctitle lt">Method 방식</div><span style="font-size:12px;color:rgba(255,255,255,0.9);line-height:1.6">${d.method||'<span style="opacity:.35;font-style:italic">미입력</span>'}</span></div>
        <div class="ch-ct">
          <div class="ch-cc"><div class="ctitle">실력 Expertise</div>${cv(d.expertise,'미입력',false)}</div>
          <div class="ch-cc"><div class="ctitle">매력 Humanity</div>${cv(d.humanity,'미입력',false)}</div>
        </div>
        <div class="ch-pl"><div class="ctitle lt">Attitude 태도</div><span style="font-size:12px;color:rgba(255,255,255,0.9);line-height:1.6">${d.attitude||'<span style="opacity:.35;font-style:italic">미입력</span>'}</span></div>
      </div>
      <div class="ch-fn">
        <div class="ch-fc"><div class="ctitle lt">꿈의 고객 Target</div>${cv(d.dream,'미입력',true)}</div>
        <div class="ch-fc"><div class="ctitle lt">약속 Value</div>${cv(d.value,'미입력',true)}</div>
      </div>
      ${(d.dream||d.value)?`<div class="ch-fn-arrow">${d.dream||'고객'} → ${d.value||'약속'}</div>`:''}
    </div>
  </div>`;
}

loadData();
render();
</script>
</body>
</html>
