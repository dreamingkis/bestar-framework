<!DOCTYPE html>
<html lang="ko">
<head>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --b1: #0B3F6B; --b2: #0081B4; --b3: #009FC2; --b4: #B8E8F0; --b5: #E0F5FA; --b6: #F0FAFE;
  --text: #1a1a2e; --text2: #4a5568; --text3: #9aa5b4;
  --bg: #ffffff; --bg2: #f8fbfe; --bg3: #f0f4f8;
  --border: rgba(0,129,180,0.15); --border2: rgba(0,129,180,0.3);
  --radius: 10px; --radius-lg: 14px;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

/* 헤더 */
.top-bar { background: var(--b1); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(11,63,107,0.3); }
.top-bar-logo { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.top-bar-logo span { color: var(--b4); }
.top-bar-client { display: flex; align-items: center; gap: 10px; }
.top-bar-client label { color: var(--b4); font-size: 12px; white-space: nowrap; }
.top-bar-client input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-size: 14px; font-family: inherit; padding: 6px 12px; width: 200px; }
.top-bar-client input::placeholder { color: rgba(255,255,255,0.4); }
.top-bar-client input:focus { outline: none; background: rgba(255,255,255,0.15); border-color: var(--b4); }

/* 레이아웃 */
.layout { display: flex; min-height: calc(100vh - 56px); }

/* 사이드바 */
.sidebar { width: 220px; background: var(--b1); padding: 1.5rem 0; flex-shrink: 0; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
.mode-section { padding: 0 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 1rem; }
.mode-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding: 0 4px; }
.mode-btn { display: block; width: 100%; padding: 8px 12px; border-radius: 8px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-size: 12px; font-family: inherit; text-align: left; cursor: pointer; transition: all 0.15s; margin-bottom: 4px; }
.mode-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.mode-btn.active { background: rgba(0,129,180,0.4); color: #fff; border-left: 2px solid var(--b3); padding-left: 10px; }
.steps-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding: 0 1rem; }
.step-item { display: flex; align-items: center; gap: 10px; padding: 9px 1rem; cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent; }
.step-item:hover { background: rgba(255,255,255,0.05); }
.step-item.active { background: rgba(0,159,194,0.15); border-left-color: var(--b3); }
.step-item.done .step-num { background: var(--b2); color: #fff; }
.step-item.active .step-num { background: var(--b3); color: #fff; }
.step-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-name { font-size: 12px; color: rgba(255,255,255,0.6); }
.step-item.active .step-name { color: #fff; font-weight: 500; }
.step-item.done .step-name { color: rgba(255,255,255,0.8); }

/* 메인 콘텐츠 */
.main { flex: 1; padding: 2rem; max-width: 900px; }
.card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(11,63,107,0.06); }
.card-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
.card-ic { width: 36px; height: 36px; border-radius: 10px; background: var(--b1); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.card-ic.b2 { background: var(--b2); }
.card-ttl { font-size: 17px; font-weight: 700; color: var(--b1); }
.card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.guide { background: var(--b6); border-left: 3px solid var(--b2); border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 16px; margin-bottom: 1.25rem; font-size: 13px; color: var(--text2); line-height: 1.7; }
.guide strong { color: var(--b1); }
.ex { background: var(--b5); border: 1px solid var(--b4); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 1.25rem; }
.ex-lbl { font-size: 10px; font-weight: 700; color: var(--b2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.ex-txt { font-size: 13px; color: var(--b1); line-height: 1.7; }
.fl { margin-bottom: 1.25rem; }
.fl-lbl { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }
.fl-hint { font-size: 11px; color: var(--text3); margin-bottom: 8px; display: block; }
input[type="text"], textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius); background: var(--bg);
  color: var(--text); font-size: 14px; font-family: inherit;
  transition: border-color 0.15s;
}
input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--b2); box-shadow: 0 0 0 3px rgba(0,129,180,0.1); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

/* 키워드 */
.kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 6px; }
.kw {
  padding: 8px 11px; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 12px; cursor: pointer;
  text-align: left; transition: all 0.12s; line-height: 1.4;
  font-family: inherit;
}
.kw .kr { display: block; font-size: 12px; font-weight: 500; }
.kw .en { display: block; font-size: 10px; opacity: 0.55; margin-top: 1px; }
.kw:hover { border-color: var(--b3); background: var(--b6); }
.kw[data-sel="1"] { color: #fff !important; border-color: transparent !important; }
.kw[data-sel="1"] .en { opacity: 0.75 !important; }
.kw[data-type="role"][data-sel="1"] { background: var(--b1) !important; }
.kw[data-type="target"][data-sel="1"] { background: var(--b2) !important; }
.kw[data-type="fv"][data-sel="1"] { background: var(--b1) !important; }
.kw[data-type="ev"][data-sel="1"] { background: var(--b2) !important; }
.kw[data-type="pv"][data-sel="1"] { background: var(--b3) !important; }

/* 아코디언 */
.acc { border: 1.5px solid var(--border2); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.acc-hd { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; background: var(--b6); cursor: pointer; user-select: none; transition: background 0.15s; }
.acc-hd:hover { background: var(--b5); }
.acc-title { font-size: 13px; font-weight: 500; color: var(--b1); }
.acc-meta { display: flex; align-items: center; gap: 8px; }
.acc-count { font-size: 11px; color: var(--b2); background: var(--b5); border: 1px solid var(--b4); border-radius: 99px; padding: 1px 9px; font-weight: 500; }
.acc-arrow { font-size: 11px; color: var(--b2); transition: transform 0.2s; display: inline-block; }
.acc-arrow.open { transform: rotate(180deg); }
.acc-body { padding: 12px; display: none; background: var(--bg); }
.acc-body.open { display: block; }

.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 99px; background: var(--b2); color: #fff; font-size: 10px; margin-left: 6px; vertical-align: middle; font-weight: 700; }
.divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
.tag-b { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; margin: 2px; background: var(--b5); color: var(--b1); border: 1px solid var(--b4); font-weight: 500; }

/* 네비게이션 버튼 */
.nav { display: flex; gap: 10px; margin-top: 1.5rem; }
.btn-p { padding: 11px 24px; border-radius: var(--radius); border: 1.5px solid var(--border2); background: var(--bg); color: var(--text2); font-size: 14px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.btn-p:hover { background: var(--b6); border-color: var(--b2); }
.btn-n { flex: 1; padding: 11px; border-radius: var(--radius); border: none; background: var(--b1); color: #fff; font-size: 14px; cursor: pointer; font-weight: 700; font-family: inherit; transition: all 0.15s; letter-spacing: -0.2px; }
.btn-n:hover { background: var(--b2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,129,180,0.3); }
.btn-n.b2 { background: var(--b2); }
.btn-n.b2:hover { background: var(--b3); }

/* 브랜드 하우스 */
.bh-wrap { margin-top: 1.25rem; }
.bh-roof { position: relative; height: 90px; margin-bottom: -2px; }
.bh-roof svg { width: 100%; height: 100%; }
.bh-body { border: 2px solid var(--b2); border-radius: 0 0 12px 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,129,180,0.1); }
.bh-row1 { display: grid; grid-template-columns: 170px 1fr 170px; border-bottom: 1.5px solid var(--b4); }
.bh-r1c { padding: 12px 14px; background: var(--b5); display: flex; flex-direction: column; justify-content: center; }
.bh-r1c.mid { border-left: 1.5px solid var(--b4); border-right: 1.5px solid var(--b4); }
.bh-r1c.right { text-align: center; }
.bh-row2 { display: grid; grid-template-columns: 170px 1fr; border-bottom: 1.5px solid var(--b4); }
.bh-r2l { background: var(--bg); padding: 12px 14px; border-right: 1.5px solid var(--b4); min-height: 100px; }
.bh-r2r { display: grid; grid-template-columns: 1fr 1fr 1fr; }
.bh-val { background: var(--bg); border-right: 1px solid var(--b4); overflow: hidden; }
.bh-val:last-child { border-right: none; }
.bh-val-hdr { font-size: 9px; font-weight: 700; color: var(--b1); text-transform: uppercase; letter-spacing: 0.8px; text-align: center; background: var(--b5); padding: 6px 4px; border-bottom: 1px solid var(--b4); }
.bh-val-bd { padding: 10px; }
.bh-kb-hdr { background: var(--b4); padding: 8px 14px; border-bottom: 1px solid var(--b3); text-align: center; font-size: 12px; font-weight: 700; color: var(--b1); letter-spacing: 0.5px; }
.bh-kb-bd { background: var(--bg); padding: 12px 14px; min-height: 56px; }
.cell-hdr { font-size: 10px; font-weight: 700; color: var(--b2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
.cv { font-size: 12px; color: var(--b1); line-height: 1.6; }
.cv-m { font-size: 11px; color: var(--text3); font-style: italic; }
.ch-auth { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1.5px solid var(--b3); }
.ch-ac { padding: 10px; text-align: center; background: var(--b1); color: #fff; border-right: 1.5px solid rgba(255,255,255,0.15); }
.ch-ac:last-child { border-right: none; }
.ch-al { font-size: 9px; color: var(--b4); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.ch-av { font-size: 12px; font-weight: 500; }
.ch-pp { display: grid; grid-template-columns: 1fr 2fr 1fr; border-bottom: 1.5px solid var(--b3); }
.ch-pl { padding: 12px; background: var(--b2); color: #fff; }
.ch-pl:first-child { border-right: 1.5px solid rgba(255,255,255,0.2); }
.ch-pl:last-child { border-left: 1.5px solid rgba(255,255,255,0.2); }
.ch-ct { display: grid; grid-template-rows: 1fr 1fr; }
.ch-cc { padding: 12px; background: var(--b6); border-bottom: 1px solid var(--b4); }
.ch-cc:last-child { border-bottom: none; }
.ch-fn { display: grid; grid-template-columns: 1fr 1fr; }
.ch-fc { padding: 12px; background: var(--b1); color: #fff; }
.ch-fc:first-child { border-right: 1.5px solid rgba(255,255,255,0.15); }
.ctitle { font-size: 9px; font-weight: 700; color: var(--b3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.ctitle.lt { color: var(--b4); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">bestar <span>브랜딩 워크숍</span></div>
  <div class="top-bar-client">
    <label>클라이언트</label>

</div>

<div class="layout">

    <div class="mode-section">
      <div class="mode-label">워크숍 모드</div>
      <button class="mode-btn active" onclick="setMode('both',this)">브랜드 + 콘텐츠</button>
      <button class="mode-btn" onclick="setMode('brand',this)">브랜드 하우스만</button>
      <button class="mode-btn" onclick="setMode('content',this)">콘텐츠 하우스만</button>
    </div>

</div>

<script>
let mode='both', step=0, cN='';
let d={ target:[],targetCustom:'', role:[],roleCustom:'', product:'',benefit:'', fv:[],ev:[],pv:[], promise:'',slogan:'', identity:'', scale:'',time:'',perf:'', method:'',attitude:'', expertise:'',humanity:'', dream:'',value:'' };

const bSteps=[{id:'target',label:'타겟 페르소나',icon:'🎯'},{id:'role',label:'브랜드 역할',icon:'🏠'},{id:'benefit',label:'핵심 혜택',icon:'✦'},{id:'values',label:'핵심 가치',icon:'💎'},{id:'promise',label:'브랜드 약속',icon:'◈'},{id:'slogan',label:'슬로건',icon:'★'},{id:'brand_result',label:'브랜드 하우스',icon:'🏠'}];
const cSteps=[{id:'identity',label:'정체성',icon:'▲'},{id:'authority',label:'권위의 증거',icon:'📊'},{id:'pillars',label:'기둥',icon:'🏗'},{id:'core',label:'콘텐츠 영역',icon:'◈'},{id:'foundation',label:'토대',icon:'🧱'},{id:'content_result',label:'콘텐츠 하우스',icon:'🏠'}];
function getSteps(){ return mode==='brand'?bSteps:mode==='content'?cSteps:[...bSteps,...cSteps]; }

function setMode(m,btn){
  mode=m; step=0;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const steps=getSteps();
  // 사이드바
  document.getElementById('sidebar-steps').innerHTML=steps.map((s,i)=>{
    const cls=i<step?'done':i===step?'active':'';
    return `<div class="step-item ${cls}" onclick="goStep(${i})">
      <div class="step-num">${i<step?'✓':i+1}</div>
      <span class="step-name">${s.icon} ${s.label}</span>
    </div>`;
  }).join('');
  renderStep();
}
function goStep(i){ step=i; render(); }
function next(){ if(step<getSteps().length-1){ step++; render(); window.scrollTo(0,0); } }
function prev(){ if(step>0){ step--; render(); window.scrollTo(0,0); } }

  {kr:'가정적인 사람',en:'Family-Oriented'},{kr:'대중문화 덕후',en:'Cultural Enthusiast'},{kr:'기록수집가',en:'Memory Keeper'},
  {kr:'낙관주의자',en:'Optimist'},{kr:'사색가',en:'Deep Thinker'},{kr:'확신의 외향인',en:'Outgoing Connector'},

];

  {cat:'지식·안내 Knowledge & Guide',icon:'📚',items:[{kr:'선생님',en:'Teacher'},{kr:'멘토',en:'Mentor'},{kr:'안내자',en:'Guide'},{kr:'조언자',en:'Adviser'},{kr:'철학자',en:'Philosopher'},{kr:'분석가',en:'Analyst'}]},

  {cat:'전문·해결 Expert & Solver',icon:'🔧',items:[{kr:'컨설턴트',en:'Consultant'},{kr:'코치',en:'Coach'},{kr:'트레이너',en:'Trainer'},{kr:'기술자',en:'Engineer'},{kr:'장인',en:'Master / Craftman'},{kr:'전문가',en:'Specialist'}]},

function kGrid(list,field,max){
  return `<div class="kw-grid">${list.map(k=>{
    const sel=d[field].includes(k.kr)?'1':'0';
    const safe=k.kr.replace(/'/g,"\\'");
    return `<button class="kw" data-type="${field}" data-val="${k.kr}" data-sel="${sel}" onclick="toggleK('${field}','${safe}',${max},this)"><span class="kr">${k.kr}</span><span class="en">${k.en}</span></button>`;
  }).join('')}</div>`;
}
function roleAcc(){
  return roleCategories.map((cat,ci)=>{
    const selInCat=cat.items.filter(k=>d.role.includes(k.kr));
    const isOpen=selInCat.length>0||ci===0;
    return `<div class="acc">
      <div class="acc-hd" onclick="toggleAcc(this)">
        <span class="acc-title">${cat.icon} ${cat.cat}</span>
        <div class="acc-meta">${selInCat.length>0?`<span class="acc-count">${selInCat.length}개 선택</span>`:''}<span class="acc-arrow ${isOpen?'open'}">▼</span></div>
      </div>
      <div class="acc-body ${isOpen?'open'}">
        <div class="kw-grid">${cat.items.map(k=>{
          const sel=d.role.includes(k.kr)?'1':'0';
          const safe=k.kr.replace(/'/g,"\\'");
          return `<button class="kw" data-type="role" data-val="${k.kr}" data-sel="${sel}" onclick="toggleK('role','${safe}',1,this)"><span class="kr">${k.kr}</span><span class="en">${k.en}</span></button>`;
        }).join('')}</div>
      </div>
    </div>`;
  }).join('');
}
function toggleAcc(hd){
  const body=hd.nextElementSibling,arrow=hd.querySelector('.acc-arrow'),isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);arrow.classList.toggle('open',!isOpen);
}
function toggleK(field,val,max,btn){
  if(d[field].includes(val)){ d[field]=d[field].filter(x=>x!==val); btn.dataset.sel='0'; }
  else if(d[field].length<max){
    if(max===1&&d[field].length>=1){
      const oldBtn=document.querySelector(`.kw[data-type="${field}"][data-val="${d[field][0]}"]`);
      if(oldBtn) oldBtn.dataset.sel='0'; d[field]=[];
    }
    d[field].push(val); btn.dataset.sel='1';
  }
  const badge=document.getElementById('badge-'+field);
  if(badge) badge.textContent=d[field].length;
  if(field==='role') updateAccCounts();
}
function updateAccCounts(){
  roleCategories.forEach((cat,ci)=>{
    const acc=document.querySelectorAll('.acc')[ci]; if(!acc) return;
    const sel=cat.items.filter(k=>d.role.includes(k.kr));
    const meta=acc.querySelector('.acc-meta'),arrow=acc.querySelector('.acc-arrow');
    const existing=meta.querySelector('.acc-count');
    if(sel.length>0){ if(existing) existing.textContent=`${sel.length}개 선택`; else{const s=document.createElement('span');s.className='acc-count';s.textContent=`${sel.length}개 선택`;meta.insertBefore(s,arrow);} }
    else if(existing) existing.remove();
  });
}

    el.innerHTML=`<div class="card"><div class="card-hd"><div class="card-ic">📊</div><div><div class="card-ttl">권위의 증거 Authority</div><div class="card-sub">3초 만에 신뢰를 만드는 숫자</div></div></div><div class="guide">말이 아닌 <strong>숫자와 사실</strong>로 신뢰를 만드세요. "오래 했어요" ❌ → "7년, 200건" ✅</div><div class="fl"><label class="fl-lbl">규모 Scale</label><input type="text" value="${d.scale}" oninput="d.scale=this.value" placeholder="예) 컨설팅 클라이언트 100명+" /></div><div class="fl"><label class="fl-lbl">경력 Time</label><input type="text" value="${d.time}" oninput="d.time=this.value" placeholder="예) 브랜딩 컨설팅 7년" /></div><div class="fl"><label class="fl-lbl">성과 Performance</label><input type="text" value="${d.perf}" oninput="d.perf=this.value" placeholder="예) 수강생 브랜드 전환율 3배" /></div></div>${nav()}`;
  } else if(s.id==='pillars'){
    el.innerHTML=`<div class="card"><div class="card-hd"><div class="card-ic">🏗</div><div><div class="card-ttl">기둥 Pillars</div><div class="card-sub">모든 콘텐츠를 관통하는 나만의 필터</div></div></div><div class="fl"><label class="fl-lbl">방식/시선 Method</label><textarea oninput="d.method=this.value" placeholder="예) 강점 기반으로 정체성을 먼저 잡고, 콘텐츠 구조를 뒤에 얹는 방식">${d.method}</textarea></div><div class="fl"><label class="fl-lbl">태도/소통 Attitude</label><textarea oninput="d.attitude=this.value" placeholder="예) 돌려 말하지 않고 핵심을 짚어주되, 클라이언트 언어를 먼저 듣는 태도">${d.attitude}</textarea></div></div>${nav()}`;
  } else if(s.id==='core'){
    el.innerHTML=`<div class="card"><div class="card-hd"><div class="card-ic b2">◈</div><div><div class="card-ttl">콘텐츠 영역 Core</div><div class="card-sub">피드에 올라갈 두 개의 핵심 축</div></div></div><div class="fl"><label class="fl-lbl">실력 Expertise</label><textarea oninput="d.expertise=this.value" placeholder="예) 브랜딩 케이스 스터디, 클라이언트 비포&애프터">${d.expertise}</textarea></div><div class="fl"><label class="fl-lbl">매력 Humanity</label><textarea oninput="d.humanity=this.value" placeholder="예) 1인기업 운영 이야기, 브랜딩 철학">${d.humanity}</textarea></div></div>${nav()}`;
  } else if(s.id==='foundation'){
    el.innerHTML=`<div class="card"><div class="card-hd"><div class="card-ic">🧱</div><div><div class="card-ttl">토대 Foundation</div><div class="card-sub">이 모든 집이 지어지는 땅</div></div></div><div class="fl"><label class="fl-lbl">꿈의 고객 Dream Customer</label><textarea oninput="d.dream=this.value" placeholder="예) 실력은 있는데 브랜드가 없어서 소개로만 일하는 5년차 1인 코치">${d.dream}</textarea></div><div class="fl"><label class="fl-lbl">약속 Value</label><textarea oninput="d.value=this.value" placeholder="예) 막연했던 정체성이 선명해지고, 설명 없이도 찾아오는 고객과 일하게 된다">${d.value}</textarea></div></div>${nav('완성 보기 →')}`;
  } else if(s.id==='content_result'){
    el.innerHTML=`<div class="card"><div class="card-hd"><div class="card-ic b2">🏠</div><div><div class="card-ttl">콘텐츠 하우스 완성</div><div class="card-sub">${cN||'클라이언트'}</div></div></div>${renderCH()}</div>${nav(null,true)}`;
  }
}

function cv(v,ph,light){ return v?`<span style="font-size:12px;color:${light?'#fff':'var(--b1)'};line-height:1.6">${v}</span>`:`<span class="cv-m">${ph}</span>`; }
function tags(arr){ return arr.length?arr.map(a=>`<span class="tag-b">${a}</span>`).join(''):'<span class="cv-m">미선택</span>'; }

function renderBH(){
  const role=d.role[0]||d.roleCustom||'—';
  const targetStr=d.target.slice(0,3).join(' · ')||(d.targetCustom||'—');
  return `<div class="bh-wrap">
    <div class="bh-roof"><svg viewBox="0 0 800 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,90 400,0 800,90" fill="#0081B4"/>
      <text x="400" y="42" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.65)" font-family="sans-serif" letter-spacing="2">SLOGAN</text>
      <text x="400" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">${d.slogan||'슬로건을 입력하면 여기에 표시됩니다'}</text>
    </svg></div>
    <div class="bh-body">
      <div class="bh-row1">
        <div class="bh-r1c"><div class="cell-hdr">타겟 페르소나</div>${cv(targetStr,'미입력',false)}</div>
        <div class="bh-r1c mid"><div class="cell-hdr" style="text-align:center">Brand Promise</div>${cv(d.promise,'미입력',false)}</div>
        <div class="bh-r1c right"><div class="cell-hdr">브랜드 역할</div>${cv(role,'미입력',false)}</div>
      </div>
      <div class="bh-row2">
        <div class="bh-r2l"><div class="cell-hdr">Pain Point</div><div style="font-size:12px;color:var(--b1);line-height:1.6;margin-bottom:8px">${d.targetCustom||'<span class="cv-m">미입력</span>'}</div></div>
        <div class="bh-r2r">
          <div class="bh-val"><div class="bh-val-hdr">Functional Value</div><div class="bh-val-bd">${tags(d.fv)}</div></div>
          <div class="bh-val"><div class="bh-val-hdr">Emotional Value</div><div class="bh-val-bd">${tags(d.ev)}</div></div>
          <div class="bh-val"><div class="bh-val-hdr">Personality</div><div class="bh-val-bd">${tags(d.pv)}</div></div>
        </div>
      </div>
      <div class="bh-kb-hdr">Key Benefit</div>
      <div class="bh-kb-bd">${cv(d.benefit,'핵심 혜택을 입력하면 여기에 표시됩니다',false)}</div>
    </div>
  </div>`;
}
function renderCH(){
  return `<div class="bh-wrap">
    <div class="bh-roof"><svg viewBox="0 0 800 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,90 400,0 800,90" fill="#0081B4"/>
      <text x="400" y="42" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.65)" font-family="sans-serif">Identity 정체성</text>
      <text x="400" y="68" text-anchor="middle" font-size="15" font-weight="bold" fill="white" font-family="sans-serif">${d.identity||'정체성을 입력하세요'}</text>
    </svg></div>
    <div class="bh-body">
      <div class="ch-auth">
        <div class="ch-ac"><div class="ch-al">Scale 규모</div><div class="ch-av">${d.scale||'—'}</div></div>
        <div class="ch-ac"><div class="ch-al">Time 경력</div><div class="ch-av">${d.time||'—'}</div></div>
        <div class="ch-ac"><div class="ch-al">Performance 성과</div><div class="ch-av">${d.perf||'—'}</div></div>
      </div>
      <div class="ch-pp">
        <div class="ch-pl"><div class="ctitle lt">Method 방식</div><span style="font-size:11px;color:rgba(255,255,255,0.9);line-height:1.6">${d.method||'<span style="opacity:.35;font-style:italic">미입력</span>'}</span></div>
        <div class="ch-ct">
          <div class="ch-cc"><div class="ctitle">실력 Expertise</div>${cv(d.expertise,'미입력',false)}</div>
          <div class="ch-cc"><div class="ctitle">매력 Humanity</div>${cv(d.humanity,'미입력',false)}</div>
        </div>
        <div class="ch-pl"><div class="ctitle lt">Attitude 태도</div><span style="font-size:11px;color:rgba(255,255,255,0.9);line-height:1.6">${d.attitude||'<span style="opacity:.35;font-style:italic">미입력</span>'}</span></div>
      </div>
      <div class="ch-fn">
        <div class="ch-fc"><div class="ctitle lt">꿈의 고객 Target</div>${cv(d.dream,'미입력',true)}</div>
        <div class="ch-fc"><div class="ctitle lt">약속 Value</div>${cv(d.value,'미입력',true)}</div>
      </div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
