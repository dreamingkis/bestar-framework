<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bestar 브랜딩 워크숍</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 테마 변수 (Brand House = bestar.kr 컬러) ── */
:root {
  --c1: #1a1a1a;
  --c2: #03afff;
  --c3: #68c6ef;
  --c4: #b8e0f0;
  --c5: #e0f5fa;
  --c6: #f5fcfe;
  --border: rgba(3,175,255,0.18);
  --border2: rgba(3,175,255,0.38);
  --topbar: #3e3a39;
  --sidebar: #111111;
  --bg: #ffffff;
  --bg2: #f7f7f7;
  --text: #1a1a1a;
  --text2: #555555;
  --text3: #9ca3af;
  --radius: 4px;
  --radius-lg: 8px;
}

/* ── Content House 테마 (Deep Purple) ── */
.content-mode {
  --c2: #6B4FA2;
  --c3: #9B7FD4;
  --c4: #D0B8EE;
  --c5: #EDE5FF;
  --c6: #F8F5FF;
  --border: rgba(107,79,162,0.18);
  --border2: rgba(107,79,162,0.38);
}

body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

/* ── 진행 바 ── */
.progress-track { height: 3px; background: rgba(255,255,255,0.15); }
.progress-fill { height: 3px; background: var(--c3); transition: width 0.4s ease; width: 0%; }

/* ── 상단 바 ── */
.top-bar { background: var(--topbar); padding: 0 2rem; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.top-bar-logo { color: #fff; font-size: 15px; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
.top-bar-logo span { color: #68c6ef; }
.top-bar-client { display: flex; align-items: center; gap: 10px; }
.top-bar-client label { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.top-bar-client input { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.22); border-radius: var(--radius); color: #fff; font-size: 13px; font-family: inherit; padding: 6px 12px; width: 190px; }
.top-bar-client input::placeholder { color: rgba(255,255,255,0.45); }
.top-bar-client input:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.35); }
.top-bar-client input:focus { outline: none; border-color: var(--c3); background: rgba(255,255,255,0.18); }

/* ── 레이아웃 ── */
.layout { display: flex; min-height: calc(100vh - 57px); }

/* ── 사이드바 ── */
.sidebar { width: 220px; background: var(--sidebar); padding: 1.5rem 0; flex-shrink: 0; position: sticky; top: 57px; height: calc(100vh - 57px); overflow-y: auto; }
.mode-section { padding: 0 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 1rem; }
.mode-label { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; padding: 0 4px; }
.mode-btn { display: block; width: 100%; padding: 8px 12px; border-radius: var(--radius); border: 1.5px solid transparent; background: transparent; color: rgba(255,255,255,0.45); font-size: 12px; font-family: inherit; text-align: left; cursor: pointer; transition: all 0.12s; margin-bottom: 3px; font-weight: 500; }
.mode-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
.mode-btn.active { background: var(--c2); color: #fff; font-weight: 700; border-color: transparent; }
.steps-label { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; padding: 0 1rem; }
.step-item { display: flex; align-items: center; gap: 10px; padding: 9px 1rem; cursor: pointer; transition: all 0.12s; border-left: 3px solid transparent; }
.step-item:hover { background: rgba(255,255,255,0.04); }
.step-item.active { background: rgba(255,255,255,0.06); border-left-color: var(--c2); }
.step-item.done .step-num { background: var(--c2); color: #fff; }
.step-item.active .step-num { background: var(--c2); color: #fff; }
.step-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-name { font-size: 12px; color: rgba(255,255,255,0.5); }
.step-item.active .step-name { color: #fff; font-weight: 700; }
.step-item.done .step-name { color: rgba(255,255,255,0.7); }

/* ── 메인 ── */
.main { flex: 1; padding: 2rem; max-width: 900px; }

/* ── 카드 ── */
.card { background: var(--bg); border-radius: var(--radius-lg); border-top: 4px solid var(--c2); border: 1px solid var(--border); border-top: 4px solid var(--c2); padding: 1.75rem; margin-bottom: 1.25rem; }
.card-hd { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
.card-ic { width: 38px; height: 38px; border-radius: var(--radius); background: var(--c2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.card-ic.b2 { background: var(--c3); }
.card-ttl { font-size: 18px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
.card-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── 섹션 라벨 ── */
.sec-lbl { font-size: 10px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }

/* ── 가이드 박스 ── */
.guide { background: var(--c6); border-left: 4px solid var(--c2); padding: 12px 16px; margin-bottom: 1.25rem; font-size: 13px; color: var(--text2); line-height: 1.75; }
.guide strong { color: var(--text); }

/* ── 예시 박스 ── */
.ex { background: var(--c5); border: 1.5px solid var(--c4); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 1.25rem; }
.ex-lbl { font-size: 9px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 7px; }
.ex-txt { font-size: 13px; color: var(--text); line-height: 1.7; }
.ex-copy { cursor: pointer; transition: all 0.12s; }
.ex-copy:hover { border-color: var(--c3); background: var(--c4); }
.ex-copy-hint { font-size: 10px; color: var(--c2); margin-top: 6px; font-weight: 500; }

/* ── 폼 요소 ── */
.fl { margin-bottom: 1.25rem; }
.fl-lbl { font-size: 11px; color: var(--text2); margin-bottom: 7px; display: block; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
.fl-hint { font-size: 11px; color: var(--text3); margin-bottom: 8px; display: block; }
input[type="text"], textarea {
  width: 100%; padding: 10px 14px;
  border: 2px solid var(--border2);
  border-radius: var(--radius); background: var(--bg);
  color: var(--text); font-size: 14px; font-family: inherit;
  transition: border-color 0.15s;
}
input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--c2); box-shadow: 0 0 0 3px rgba(3,175,255,0.08); }
textarea { resize: vertical; min-height: 88px; line-height: 1.65; }

/* ── 키워드 버튼 ── */
.kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 5px; }
.kw { padding: 8px 10px; border-radius: var(--radius); border: 1.5px solid var(--c4); background: var(--bg); color: var(--text2); font-size: 12px; cursor: pointer; text-align: left; transition: all 0.1s; line-height: 1.4; font-family: inherit; }
.kw .kr { display: block; font-size: 12px; font-weight: 700; }
.kw .en { display: block; font-size: 10px; opacity: 0.5; margin-top: 1px; }
.kw:hover { border-color: var(--c2); background: var(--c6); }
.kw[data-sel="1"] { color: #fff !important; border-color: transparent !important; background: var(--c2) !important; }
.kw[data-sel="1"] .en { opacity: 0.75 !important; }

/* ── 아코디언 ── */
.acc { border: 1.5px solid var(--border2); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
.acc-hd { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--c6); cursor: pointer; user-select: none; transition: background 0.12s; }
.acc-hd:hover { background: var(--c5); }
.acc-title { font-size: 12px; font-weight: 700; color: var(--text); }
.acc-meta { display: flex; align-items: center; gap: 8px; }
.acc-count { font-size: 10px; color: var(--c2); background: var(--bg); border: 1.5px solid var(--c4); border-radius: 2px; padding: 1px 8px; font-weight: 700; }
.acc-arrow { font-size: 10px; color: var(--c2); transition: transform 0.2s; display: inline-block; }
.acc-arrow.open { transform: rotate(180deg); }
.acc-body { padding: 10px; display: none; background: var(--bg); }
.acc-body.open { display: block; }

/* ── 배지 / 태그 ── */
.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 2px; background: var(--c2); color: #fff; font-size: 10px; margin-left: 6px; vertical-align: middle; font-weight: 700; }
.divider { height: 2px; background: var(--bg2); margin: 1.5rem 0; }
.tag-b { display: inline-block; padding: 3px 9px; border-radius: 2px; font-size: 11px; margin: 2px; background: var(--c5); color: var(--text); border: 1.5px solid var(--c4); font-weight: 700; }

/* ── 내비게이션 ── */
.nav { display: flex; gap: 8px; margin-top: 1.75rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
.btn-p { padding: 11px 20px; border-radius: var(--radius); border: 2px solid var(--border2); background: var(--bg); color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.12s; font-weight: 700; }
.btn-p:hover { border-color: var(--c2); color: var(--c2); }
.btn-n { flex: 1; padding: 12px; border-radius: var(--radius); border: none; background: var(--c2); color: #fff; font-size: 14px; cursor: pointer; font-weight: 900; font-family: inherit; transition: all 0.12s; letter-spacing: -0.3px; }
.btn-n:hover { background: var(--c1); }
.btn-n.b2 { background: var(--c3); }
.btn-n.b2:hover { background: var(--c2); }

/* ── 생각해보기 ── */
.think { border: 1.5px solid var(--border2); border-radius: var(--radius); margin-bottom: 1.25rem; overflow: hidden; }
.think-hd { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; background: var(--c1); cursor: pointer; user-select: none; }
.think-ttl { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; }
.think-arrow { font-size: 10px; color: rgba(255,255,255,0.5); transition: transform 0.2s; display: inline-block; }
.think-arrow.open { transform: rotate(180deg); }
.think-body { padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.35s ease; background: var(--c6); }
.think-body.open { max-height: 600px; }
.think-inner { padding: 14px 16px; }
.think-q { font-size: 12.5px; color: var(--text2); line-height: 1.7; margin-bottom: 7px; padding: 8px 12px; background: var(--bg); border-left: 3px solid var(--c2); }
.think-q strong { color: var(--text); display: block; margin-bottom: 2px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Brand Statement 템플릿 ── */
.fill-wrap { background: var(--bg); border: 2px solid var(--c4); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 1rem; }
.fill-lbl { font-size: 9px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
.fill-row { font-size: 13.5px; color: var(--text2); line-height: 3; }
.fill-row .fi { display: inline-block; border: none; border-bottom: 2.5px solid var(--c2); background: var(--c5); color: var(--text); font-size: 13px; font-family: inherit; font-weight: 700; padding: 1px 8px; min-width: 70px; max-width: 190px; outline: none; border-radius: var(--radius) var(--radius) 0 0; transition: background 0.12s; }
.fill-row .fi:focus { background: var(--c4); }
.gen-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: none; border-radius: var(--radius); background: var(--c2); color: #fff; font-size: 12px; font-family: inherit; cursor: pointer; font-weight: 900; transition: all 0.12s; margin-top: 10px; letter-spacing: 0.3px; text-transform: uppercase; }
.gen-btn:hover { background: var(--c1); }

/* ── Brand Concept ── */
.concept-box { background: var(--c1); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 1rem; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 15px; font-weight: 900; color: #fff; line-height: 2.4; letter-spacing: -0.3px; }
.concept-box .ci { display: inline-block; border: none; border-bottom: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; font-family: inherit; font-weight: 700; padding: 2px 8px; min-width: 80px; max-width: 170px; outline: none; border-radius: var(--radius) var(--radius) 0 0; }
.concept-box .ci::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; font-size: 12px; }
.concept-box .ci:focus { border-bottom-color: var(--c3); background: rgba(255,255,255,0.12); }

/* ── Brand Message ── */
.msg-box { background: var(--c5); border: 2px solid var(--c4); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.msg-quote { font-size: 24px; color: var(--c2); font-weight: 900; line-height: 1; flex-shrink: 0; }
.msg-box .mi { flex: 1; border: none; border-bottom: 2px solid var(--c4); background: transparent; color: var(--text); font-size: 14px; font-family: inherit; font-style: italic; padding: 2px 4px; outline: none; }
.msg-box .mi:focus { border-bottom-color: var(--c2); }

/* ── 브랜드 하우스 시각화 ── */
.bh-wrap { margin-top: 1.25rem; }
.bh-roof { position: relative; height: 90px; margin-bottom: -2px; }
.bh-roof svg { width: 100%; height: 100%; }
.bh-body { border: 2px solid var(--c3); border-radius: 0 0 8px 8px; overflow: hidden; }
.bh-row1 { display: grid; grid-template-columns: 170px 1fr 170px; border-bottom: 1.5px solid var(--c4); }
.bh-r1c { padding: 12px 14px; background: var(--c5); display: flex; flex-direction: column; justify-content: center; }
.bh-r1c.mid { border-left: 1.5px solid var(--c4); border-right: 1.5px solid var(--c4); }
.bh-r1c.right { text-align: center; }
.bh-row2 { display: grid; grid-template-columns: 170px 1fr; border-bottom: 1.5px solid var(--c4); }
.bh-r2l { background: var(--bg); padding: 12px 14px; border-right: 1.5px solid var(--c4); min-height: 100px; }
.bh-r2r { display: grid; grid-template-columns: 1fr 1fr 1fr; }
.bh-val { background: var(--bg); border-right: 1px solid var(--c4); overflow: hidden; }
.bh-val:last-child { border-right: none; }
.bh-val-hdr { font-size: 9px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 1px; text-align: center; background: var(--c5); padding: 6px 4px; border-bottom: 1px solid var(--c4); }
.bh-val-bd { padding: 10px; }
.bh-kb-hdr { background: var(--c2); padding: 8px 14px; text-align: center; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
.bh-kb-bd { background: var(--bg); padding: 12px 14px; min-height: 56px; }
.cell-hdr { font-size: 9px; font-weight: 700; color: var(--c2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.cv { font-size: 12px; color: var(--text); line-height: 1.6; }
.cv-m { font-size: 11px; color: var(--text3); font-style: italic; }
.ch-auth { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1.5px solid var(--c3); }
.ch-ac { padding: 12px; text-align: center; background: var(--c1); color: #fff; border-right: 1.5px solid rgba(255,255,255,0.12); }
.ch-ac:last-child { border-right: none; }
.ch-al { font-size: 9px; color: var(--c4); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.ch-av { font-size: 12px; font-weight: 700; }
.ch-pp { display: grid; grid-template-columns: 1fr 2fr 1fr; border-bottom: 1.5px solid var(--c3); }
.ch-pl { padding: 12px; background: var(--c2); color: #fff; }
.ch-pl:first-child { border-right: 1.5px solid rgba(255,255,255,0.2); }
.ch-pl:last-child { border-left: 1.5px solid rgba(255,255,255,0.2); }
.ch-ct { display: grid; grid-template-rows: 1fr 1fr; }
.ch-cc { padding: 12px; background: var(--c6); border-bottom: 1px solid var(--c4); }
.ch-cc:last-child { border-bottom: none; }
.ch-fn { display: grid; grid-template-columns: 1fr 1fr; }
.ch-fc { padding: 12px; background: var(--c1); color: #fff; }
.ch-fc:first-child { border-right: 1.5px solid rgba(255,255,255,0.12); }
.ctitle { font-size: 9px; font-weight: 700; color: var(--c3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
.ctitle.lt { color: var(--c4); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">be<span>star</span> branding workshop</div>
  <div class="top-bar-client">
    <label>Brand</label>
    <input type="text" id="cn" placeholder="이름 또는 브랜드명..." oninput="cN=this.value" />
  </div>
</div>
<div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

<div class="layout">
  <div class="sidebar">
    <div class="mode-section">
      <div class="mode-label">Workshop Mode</div>
      <button class="mode-btn active" onclick="setMode('both',this)">브랜드 + 콘텐츠</button>
      <button class="mode-btn" onclick="setMode('brand',this)">브랜드 하우스만</button>
      <button class="mode-btn" onclick="setMode('content',this)">콘텐츠 하우스만</button>
    </div>
    <div class="steps-label">진행 단계</div>
    <div id="sidebar-steps"></div>
  </div>
  <div class="main" id="sc"></div>
</div>

<script>
let mode='both', step=0, cN='';
let d={
  target:[], targetCustom:'', role:[], roleCustom:'', product:'', benefit:'',
  fv:[], ev:[], pv:[], promise:'', slogan:'',
  identity:'', scale:'', time:'', perf:'', method:'', attitude:'',
  expertise:'', humanity:'', dream:'', value:'',
  brandMsg:'', bsConcept1:'', bsConcept2:''
};

const bSteps=[{id:'target',label:'타겟 페르소나',icon:'🎯'},{id:'role',label:'브랜드 역할',icon:'◎'},{id:'benefit',label:'핵심 혜택',icon:'✦'},{id:'values',label:'핵심 가치',icon:'◆'},{id:'promise',label:'브랜드 약속',icon:'◈'},{id:'slogan',label:'슬로건',icon:'★'},{id:'brand_result',label:'브랜드 하우스',icon:'▣'}];
const cSteps=[{id:'identity',label:'정체성',icon:'▲'},{id:'authority',label:'권위의 증거',icon:'▪'},{id:'pillars',label:'기둥',icon:'▐'},{id:'core',label:'콘텐츠 영역',icon:'◈'},{id:'foundation',label:'토대',icon:'▬'},{id:'content_result',label:'콘텐츠 하우스',icon:'▣'}];
const brandIds=new Set(['target','role','benefit','values','promise','slogan','brand_result']);

function getSteps(){ return mode==='brand'?bSteps:mode==='content'?cSteps:[...bSteps,...cSteps]; }

function setMode(m,btn){
  mode=m; step=0;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function updateTheme(){
  const steps=getSteps();
  const cur=steps[step];
  if(cur && !brandIds.has(cur.id)){
    document.body.classList.add('content-mode');
  } else {
    document.body.classList.remove('content-mode');
  }
}

function render(){
  updateTheme();
  const steps=getSteps();
  const pct=steps.length>1?(step/(steps.length-1))*100:0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('sidebar-steps').innerHTML=steps.map((s,i)=>{
    const cls=i<step?'done':i===step?'active':'';
    return `<div class="step-item ${cls}" onclick="goStep(${i})">
      <div class="step-num">${i<step?'✓':i+1}</div>
      <span class="step-name">${s.icon} ${s.label}</span>
    </div>`;
  }).join('');
  renderStep();
}
function goStep(i){ step=i; render(); }
function next(){ if(step<getSteps().length-1){ step++; render(); window.scrollTo(0,0); } }
function prev(){ if(step>0){ step--; render(); window.scrollTo(0,0); } }

/* ── 생각해보기 데이터 ── */
const stepGuides={

function thinkBox(id,open){
  const qs=stepGuides[id]; if(!qs) return '';
  return `<div class="think">
    <div class="think-hd" onclick="var b=this.nextElementSibling,a=this.querySelector('.think-arrow');b.classList.toggle('open');a.classList.toggle('open')">
      <span class="think-ttl">💡 생각해보기 — 시작 전에 읽어보세요</span>
      <span class="think-arrow ${open?'open':''}">▼</span>
    </div>
    <div class="think-body ${open?'open':''}">
      <div class="think-inner">${qs.map(q=>`<div class="think-q">${q}</div>`).join('')}</div>
    </div>
  </div>`;
}

function copyEx(text,targetId){
  const el=document.getElementById(targetId); if(!el) return;
  el.value=text; el.focus();
  el.style.borderColor='var(--c2)';
  setTimeout(()=>{ el.style.borderColor=''; },1200);
}

function kGrid(list,field,max){
  return `<div class="kw-grid">${list.map(k=>{
    const sel=d[field].includes(k.kr)?'1':'0';
    const safe=k.kr.replace(/'/g,"\\'");
    return `<button class="kw" data-type="${field}" data-val="${k.kr}" data-sel="${sel}" onclick="toggleK('${field}','${safe}',${max},this)"><span class="kr">${k.kr}</span><span class="en">${k.en}</span></button>`;
  }).join('')}</div>`;
}
function roleAcc(){
  return roleCategories.map((cat,ci)=>{
    const selInCat=cat.items.filter(k=>d.role.includes(k.kr));
    const isOpen=selInCat.length>0||ci===0;
    return `<div class="acc">
      <div class="acc-hd" onclick="toggleAcc(this)">
        <span class="acc-title">${cat.icon} ${cat.cat}</span>
        <div class="acc-meta">${selInCat.length>0?`<span class="acc-count">${selInCat.length}개 선택</span>`:''}<span class="acc-arrow ${isOpen?'open':''}">▼</span></div>
      </div>
      <div class="acc-body ${isOpen?'open':''}">
        <div class="kw-grid">${cat.items.map(k=>{
          const sel=d.role.includes(k.kr)?'1':'0';
          const safe=k.kr.replace(/'/g,"\\'");
          return `<button class="kw" data-type="role" data-val="${k.kr}" data-sel="${sel}" onclick="toggleK('role','${safe}',1,this)"><span class="kr">${k.kr}</span><span class="en">${k.en}</span></button>`;
        }).join('')}</div>
      </div>
    </div>`;
  }).join('');
}
function toggleAcc(hd){
  const body=hd.nextElementSibling,arrow=hd.querySelector('.acc-arrow'),isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen); arrow.classList.toggle('open',!isOpen);
}
function toggleK(field,val,max,btn){
  if(d[field].includes(val)){ d[field]=d[field].filter(x=>x!==val); btn.dataset.sel='0'; }
  else if(d[field].length<max){
    if(max===1&&d[field].length>=1){
      const oldBtn=document.querySelector(`.kw[data-type="${field}"][data-val="${d[field][0]}"]`);
      if(oldBtn) oldBtn.dataset.sel='0'; d[field]=[];
    }
    d[field].push(val); btn.dataset.sel='1';
  }
  const badge=document.getElementById('badge-'+field);
  if(badge) badge.textContent=d[field].length;
  if(field==='role') updateAccCounts();
}
function updateAccCounts(){
  roleCategories.forEach((cat,ci)=>{
    const acc=document.querySelectorAll('.acc')[ci]; if(!acc) return;
    const sel=cat.items.filter(k=>d.role.includes(k.kr));
    const meta=acc.querySelector('.acc-meta'),arrow=acc.querySelector('.acc-arrow');
    const existing=meta.querySelector('.acc-count');
    if(sel.length>0){ if(existing) existing.textContent=`${sel.length}개 선택`; else{const s=document.createElement('span');s.className='acc-count';s.textContent=`${sel.length}개 선택`;meta.insertBefore(s,arrow);} }
    else if(existing) existing.remove();
  });
}

      <div class="ex ex-copy" onclick="copyEx('1인기업 브랜드 언어 설계자','identity-input')">
        <div class="ex-lbl">bestar 예시 — 클릭하면 복사</div>
        <div class="ex-txt">1인기업 브랜드 언어 설계자</div>
        <div class="ex-copy-hint">▲ 클릭하면 아래 입력창에 복사</div>
      </div>
      <div class="fl"><label class="fl-lbl">나만의 타이틀</label><input type="text" id="identity-input" value="${d.identity}" oninput="d.identity=this.value" placeholder="예) 1인기업 브랜드 언어 설계자" /></div>
    </div>${nav()}`;

  } else if(s.id==='authority'){
    el.innerHTML=`<div class="card">
      <div class="card-hd"><div class="card-ic">▪</div><div><div class="card-ttl">권위의 증거 Authority</div><div class="card-sub">3초 만에 신뢰를 만드는 숫자</div></div></div>
      ${thinkBox('authority',true)}
      <div class="fl"><label class="fl-lbl">규모 Scale</label><input type="text" value="${d.scale}" oninput="d.scale=this.value" placeholder="예) 컨설팅 클라이언트 100명+" /></div>
      <div class="fl"><label class="fl-lbl">경력 Time</label><input type="text" value="${d.time}" oninput="d.time=this.value" placeholder="예) 브랜딩 컨설팅 7년" /></div>
      <div class="fl"><label class="fl-lbl">성과 Performance</label><input type="text" value="${d.perf}" oninput="d.perf=this.value" placeholder="예) 수강생 브랜드 전환율 3배" /></div>
    </div>${nav()}`;

  } else if(s.id==='pillars'){
    el.innerHTML=`<div class="card">
      <div class="card-hd"><div class="card-ic">▐</div><div><div class="card-ttl">기둥 Pillars</div><div class="card-sub">모든 콘텐츠를 관통하는 나만의 필터</div></div></div>
      ${thinkBox('pillars',true)}
      <div class="fl"><label class="fl-lbl">방식/시선 Method</label><textarea oninput="d.method=this.value" placeholder="예) 강점 기반으로 정체성을 먼저 잡고, 콘텐츠 구조를 뒤에 얹는 방식">${d.method}</textarea></div>
      <div class="fl"><label class="fl-lbl">태도/소통 Attitude</label><textarea oninput="d.attitude=this.value" placeholder="예) 돌려 말하지 않고 핵심을 짚어주되, 클라이언트 언어를 먼저 듣는 태도">${d.attitude}</textarea></div>
    </div>${nav()}`;

  } else if(s.id==='core'){
    el.innerHTML=`<div class="card">
      <div class="card-hd"><div class="card-ic b2">◈</div><div><div class="card-ttl">콘텐츠 영역 Core</div><div class="card-sub">피드에 올라갈 두 개의 핵심 축</div></div></div>
      ${thinkBox('core',true)}
      <div class="fl"><label class="fl-lbl">실력 Expertise</label><textarea oninput="d.expertise=this.value" placeholder="예) 브랜딩 케이스 스터디, 클라이언트 비포&amp;애프터">${d.expertise}</textarea></div>
      <div class="fl"><label class="fl-lbl">매력 Humanity</label><textarea oninput="d.humanity=this.value" placeholder="예) 1인기업 운영 이야기, 브랜딩 철학">${d.humanity}</textarea></div>
    </div>${nav()}`;

  } else if(s.id==='foundation'){
    el.innerHTML=`<div class="card">
      <div class="card-hd"><div class="card-ic">▬</div><div><div class="card-ttl">토대 Foundation</div><div class="card-sub">이 모든 집이 지어지는 땅</div></div></div>
      ${thinkBox('foundation',true)}
      <div class="fl"><label class="fl-lbl">꿈의 고객 Dream Customer</label><textarea oninput="d.dream=this.value" placeholder="예) 실력은 있는데 브랜드가 없어서 소개로만 일하는 5년차 1인 코치">${d.dream}</textarea></div>
      <div class="fl"><label class="fl-lbl">약속 Value</label><textarea oninput="d.value=this.value" placeholder="예) 막연했던 정체성이 선명해지고, 설명 없이도 찾아오는 고객과 일하게 된다">${d.value}</textarea></div>
    </div>${nav('완성 보기 →')}`;

  } else if(s.id==='content_result'){
    el.innerHTML=`<div class="card"><div class="card-hd"><div class="card-ic b2">▣</div><div><div class="card-ttl">콘텐츠 하우스 완성</div><div class="card-sub">${cN||'Brand'}</div></div></div>${renderCH()}</div>${nav(null,true)}`;
  }
}

function cv(v,ph,light){ return v?`<span style="font-size:12px;color:${light?'#fff':'var(--text)'};line-height:1.6">${v}</span>`:`<span class="cv-m">${ph}</span>`; }
function tags(arr){ return arr.length?arr.map(a=>`<span class="tag-b">${a}</span>`).join(''):'<span class="cv-m">미선택</span>'; }

function renderBH(){
  const role=d.role[0]||d.roleCustom||'—';
  const targetStr=d.target.slice(0,3).join(' · ')||(d.targetCustom||'—');
  return `<div class="bh-wrap">
    <div class="bh-roof"><svg viewBox="0 0 800 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,90 400,0 800,90" fill="#03afff"/>
      <text x="400" y="42" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="sans-serif" letter-spacing="3" font-weight="700">SLOGAN</text>
      <text x="400" y="68" text-anchor="middle" font-size="14" font-weight="900" fill="white" font-family="sans-serif">${d.slogan||'슬로건을 입력하면 여기에 표시됩니다'}</text>
    </svg></div>
    <div class="bh-body">
      <div class="bh-row1">
        <div class="bh-r1c"><div class="cell-hdr">타겟 페르소나</div>${cv(targetStr,'미입력',false)}</div>
        <div class="bh-r1c mid"><div class="cell-hdr" style="text-align:center">Brand Promise</div>${cv(d.promise,'미입력',false)}</div>
        <div class="bh-r1c right"><div class="cell-hdr">브랜드 역할</div>${cv(role,'미입력',false)}</div>
      </div>
      <div class="bh-row2">
        <div class="bh-r2l"><div class="cell-hdr">Pain Point</div>${cv(d.targetCustom,'미입력',false)}</div>
        <div class="bh-r2r">
          <div class="bh-val"><div class="bh-val-hdr">Functional Value</div><div class="bh-val-bd">${tags(d.fv)}</div></div>
          <div class="bh-val"><div class="bh-val-hdr">Emotional Value</div><div class="bh-val-bd">${tags(d.ev)}</div></div>
          <div class="bh-val"><div class="bh-val-hdr">Personality</div><div class="bh-val-bd">${tags(d.pv)}</div></div>
        </div>
      </div>
      <div class="bh-kb-hdr">Key Benefit</div>
      <div class="bh-kb-bd">${cv(d.benefit,'핵심 혜택을 입력하면 여기에 표시됩니다',false)}</div>
    </div>
  </div>`;
}

function renderCH(){
  return `<div class="bh-wrap">
    <div class="bh-roof"><svg viewBox="0 0 800 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,90 400,0 800,90" fill="#6B4FA2"/>
      <text x="400" y="42" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="sans-serif" letter-spacing="3" font-weight="700">IDENTITY</text>
      <text x="400" y="68" text-anchor="middle" font-size="15" font-weight="900" fill="white" font-family="sans-serif">${d.identity||'정체성을 입력하세요'}</text>
    </svg></div>
    <div class="bh-body">
      <div class="ch-auth">
        <div class="ch-ac"><div class="ch-al">Scale 규모</div><div class="ch-av">${d.scale||'—'}</div></div>
        <div class="ch-ac"><div class="ch-al">Time 경력</div><div class="ch-av">${d.time||'—'}</div></div>
        <div class="ch-ac"><div class="ch-al">Performance 성과</div><div class="ch-av">${d.perf||'—'}</div></div>
      </div>
      <div class="ch-pp">
        <div class="ch-pl"><div class="ctitle lt">Method 방식</div><span style="font-size:11px;color:rgba(255,255,255,0.9);line-height:1.6">${d.method||'<span style="opacity:.35;font-style:italic">미입력</span>'}</span></div>
        <div class="ch-ct">
          <div class="ch-cc"><div class="ctitle">실력 Expertise</div>${cv(d.expertise,'미입력',false)}</div>
          <div class="ch-cc"><div class="ctitle">매력 Humanity</div>${cv(d.humanity,'미입력',false)}</div>
        </div>
        <div class="ch-pl"><div class="ctitle lt">Attitude 태도</div><span style="font-size:11px;color:rgba(255,255,255,0.9);line-height:1.6">${d.attitude||'<span style="opacity:.35;font-style:italic">미입력</span>'}</span></div>
      </div>
      <div class="ch-fn">
        <div class="ch-fc"><div class="ctitle lt">꿈의 고객 Target</div>${cv(d.dream,'미입력',true)}</div>
        <div class="ch-fc"><div class="ctitle lt">약속 Value</div>${cv(d.value,'미입력',true)}</div>
      </div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
